name: Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Еженедельный запуск по воскресеньям
    - cron: '0 0 * * 0'

jobs:
  integration:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Create test directories
      run: |
        mkdir -p leya_brain leya_soul

    - name: Run integration tests
      run: |
        pytest tests/test_integration.py -v --tb=short

    - name: Run smoke test
      run: |
        timeout 30 python -c "
        from unittest.mock import MagicMock, patch
        with patch('leya_core.memory.chromadb.PersistentClient') as mock:
            mock.return_value = MagicMock()
            from LeyaOS import LeyaOS
            from leya_core.config import LeyaConfig
            config = LeyaConfig()
            leya = LeyaOS(config=config, use_web=False)
            print('✅ Smoke test passed')
        "