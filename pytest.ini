[pytest]
# Конфигурация pytest для LeyaOS

# Паттерны для поиска тестов
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Директории с тестами
testpaths = tests

# Маркеры
markers =
    slow: медленные тесты (исключаются по умолчанию)
    integration: интеграционные тесты
    unit: unit-тесты

# Настройки вывода
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Asyncio mode
asyncio_mode = auto

# Таймаут для тестов (требует pytest-timeout)
timeout = 30
timeout_method = thread