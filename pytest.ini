[pytest]
# =============================================================================
# Конфигурация pytest для LeyaOS
# =============================================================================

# Паттерны для поиска тестов
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Директории с тестами
testpaths = tests

# Маркеры
markers =
    slow: медленные тесты (исключаются по умолчанию)
    integration: интеграционные тесты
    unit: unit-тесты
    property: property-based тесты (hypothesis)
    requires_ollama: тесты, требующие запущенного Ollama

# Настройки вывода
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -m "not slow and not requires_ollama"

# Asyncio mode
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Таймаут для тестов (требует pytest-timeout)
timeout = 30
timeout_method = thread

# Hypothesis настройки
# (дополнительно настраивается в tests/property/conftest.py)

# Coverage (опционально, включается через --cov=leya_core)
# addopts += --cov=leya_core --cov-report=term-missing --cov-report=html